<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jqPlot Demos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 2rem;
      background: #f4f6f9;
      font-family: "Trebuchet MS", Arial, Helvetica, sans-serif;
      color: #333;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.8rem;
      color: #2c3e50;
    }

    .subtitle {
      color: #666;
      margin: 0 0 2.5rem;
      font-size: 0.95rem;
    }

    .chart-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    .chart-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 1.5rem;
      flex: 1 1 480px;
    }

    .chart-card h2 {
      margin: 0 0 1.25rem;
      font-size: 1.1rem;
      color: #2c3e50;
      border-bottom: 2px solid #e8ecf0;
      padding-bottom: 0.6rem;
    }

    .chart-container {
      /* jqPlot needs explicit dimensions on the target div */
    }

    #pie-chart    { width: 100%; height: 300px; }
    #donut-chart  { width: 100%; height: 300px; }
    #bar-chart    { width: 100%; height: 300px; }
    #hbar-chart   { width: 100%; height: 300px; }

    footer {
      margin-top: 1rem;
      color: #999;
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
